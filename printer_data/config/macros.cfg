  {% endif %}

[gcode_macro ASSIGN_SPOOL]
variable_pending_tool: ""
gcode:
  SET_GCODE_VARIABLE MACRO=ASSIGN_SPOOL VARIABLE=pending_tool VALUE="'{params.TOOL}'"