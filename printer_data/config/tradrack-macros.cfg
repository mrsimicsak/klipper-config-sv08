[gcode_macro _T_TR]
gcode:
    T3

[gcode_macro T4]
variable_color: ""
variable_tool_number: 4
variable_spool_id: None
gcode:
    _T_TR
    TR_LOAD_TOOLHEAD TOOL=0
    {% if spool_id != None %}
      SET_ACTIVE_SPOOL ID={spool_id}
    {% endif %}

