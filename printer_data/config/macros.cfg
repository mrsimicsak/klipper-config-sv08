[gcode_macro _IDLE_TIMEOUT]
gcode:
    {% if printer.print_stats.state == "paused" %}
      RESPOND TYPE=echo MSG="No operations in 10min!"
    {% else %}
     M84
     TURN_OFF_HEATERS
    {% endif %}

[gcode_macro PARK]
gcode:
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    G90
    G0 X{max_x-10} Y{max_y-10} Z5 F30000

[gcode_macro CALIBRATE_MOVE_OVER_PROBE]
gcode:
    BED_MESH_CLEAR
    G0 Z52 F10000 # UPDATE THIS WITH YOUR POSITION
    G0 X319.78 Y314.40 F10000  # UPDATE THIS WITH YOUR POSITION

[gcode_macro CALIBRATE_TOOL_OFFSETS]
gcode:
    T0
    CALIBRATE_MOVE_OVER_PROBE
    M109 S150  # Heat up as much as possible without oozing to account for any thermal deformations
    TOOL_LOCATE_SENSOR
    M104 S0
    # Other tools
    {% for tool in [1,2,3] %}
        T{tool}
        M109 S150
        TOOL_CALIBRATE_TOOL_OFFSET
        M104 S0
    {% endfor %}

[gcode_macro CALIBRATE_NOZZLE_PROBE_OFFSET]
gcode:    
    CALIBRATE_MOVE_OVER_PROBE
    M109 S150    
    TOOL_LOCATE_SENSOR
    TOOL_CALIBRATE_PROBE_OFFSET
    M104 S0

[gcode_macro TR_SETUP_LANES]
gcode:
    TR_ASSIGN_LANE lane=1 tool=0
    TR_SET_DEFAULT_LANE lane=1 tool=0
    
    TR_ASSIGN_LANE lane=2 tool=1
    TR_ASSIGN_LANE lane=3 tool=1
    
    TR_ASSIGN_LANE lane=4 tool=2
    TR_ASSIGN_LANE lane=5 tool=3
    TR_ASSIGN_LANE lane=6 tool=4
    TR_ASSIGN_LANE lane=7 tool=5
    TR_ASSIGN_LANE lane=8 tool=6
    TR_ASSIGN_LANE lane=9 tool=7
    TR_ASSIGN_LANE lane=10 tool=8
    TR_ASSIGN_LANE lane=11 tool=9
    TR_ASSIGN_LANE lane=12 tool=10

[delayed_gcode RESTORE_SPOOL_IDS]
initial_duration: 1  # runs 1 second after Klipper starts
gcode:
  {% set svv = printer.save_variables.variables %}
  # Restore T0 spool ID if previously saved by middleware
  {% if svv.t0__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T0 VARIABLE=spool_id VALUE={svv.t0__spool_id}
    SET_ACTIVE_SPOOL ID={svv.t0__spool_id}
  {% endif %}
  # Restore T1 spool ID if previously saved by middleware
  {% if svv.t1__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T1 VARIABLE=spool_id VALUE={svv.t1__spool_id}
  {% endif %}
  # Restore T2 spool ID if previously saved by middleware
  {% if svv.t2__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T2 VARIABLE=spool_id VALUE={svv.t2__spool_id}
  {% endif %}
  # Restore T3 spool ID if previously saved by middleware
  {% if svv.t3__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T3 VARIABLE=spool_id VALUE={svv.t3__spool_id}
  {% endif %}

  {% if svv.t4__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T4 VARIABLE=spool_id VALUE={svv.t4__spool_id}
  {% endif %}

  {% if svv.t5__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T5 VARIABLE=spool_id VALUE={svv.t5__spool_id}
  {% endif %}

  {% if svv.t6__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T6 VARIABLE=spool_id VALUE={svv.t6__spool_id}
  {% endif %}

  {% if svv.t7__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T7 VARIABLE=spool_id VALUE={svv.t7__spool_id}
  {% endif %}

  {% if svv.t8__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T8 VARIABLE=spool_id VALUE={svv.t8__spool_id}
  {% endif %}

  {% if svv.t9__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T9 VARIABLE=spool_id VALUE={svv.t9__spool_id}
  {% endif %}

  {% if svv.t10__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T10 VARIABLE=spool_id VALUE={svv.t10__spool_id}
  {% endif %}

  {% if svv.t11__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T11 VARIABLE=spool_id VALUE={svv.t11__spool_id}
  {% endif %}

  {% if svv.t12__spool_id is defined %}
    SET_GCODE_VARIABLE MACRO=T12 VARIABLE=spool_id VALUE={svv.t12__spool_id}
  {% endif %}

  {% if svv.t13__spool_id is defined %}
